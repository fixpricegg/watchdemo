<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WatchDemo MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>WatchDemo — AI анализ демок CS2</h1>
      <p class="subtitle">Загрузите файл <strong>name.dem</strong> и получите авторазбор матча.</p>

      <form id="uploadForm" class="card">
        <label for="demoFile">Демо-файл (.dem)</label>
        <input id="demoFile" name="file" type="file" accept=".dem" required />
        <button type="submit">Запустить анализ</button>
        <p id="status"></p>
      </form>

      <section id="results" class="results hidden"></section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
